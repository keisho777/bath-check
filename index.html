<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>お風呂チェック</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f7fa;
      text-align: center;
    }

    h1 {
      margin: 20px 0;
      font-size: 28px;
    }

    #app {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
    }

    .card {
      border-radius: 20px;
      padding: 25px;
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 6px 12px rgba(0,0,0,0.1);
      transition: 0.2s;
      user-select: none;
      display: flex;
      flex-direction: column;   /* ←縦並びに変更 */
      justify-content: center;
      align-items: center;      /* ←中央寄せ */

      gap: 10px;
    }

    .notyet {
      background: #ffe5e5;
      color: #a33;
    }

    .done {
      background: #d4f8d4;
      color: #2a7;
    }

    .icon {
      font-size: 50px;
    }

    .card:active {
      transform: scale(0.96);
    }

    .status {
      font-size: 20px;
      font-weight: normal;
    }
  </style>
</head>
<body>

<h1>🛁 お風呂チェック</h1>
<div id="app"></div>

<script>
  const members = ["母", "父", "兄"];
  const RESET_HOUR = 5;

  function getTodayKey() {
    const now = new Date();
    if (now.getHours() < RESET_HOUR) {
      now.setDate(now.getDate() - 1);
    }
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const day = String(now.getDate()).padStart(2, "0");

    return `${year}-${month}-${day}`;
  }

  function loadState() {
    return JSON.parse(localStorage.getItem(getTodayKey())) || {};
  }

  function saveState(state) {
    localStorage.setItem(getTodayKey(), JSON.stringify(state));
  }

  function render() {
    const state = loadState();
    const app = document.getElementById("app");
    app.innerHTML = "";

    members.forEach(name => {
      const done = state[name];

      const card = document.createElement("div");
      card.className = "card " + (done ? "done" : "notyet");

      const label = document.createElement("div");
      label.textContent = name;

      const icon = document.createElement("div");
      icon.className = "icon";
      const status = document.createElement("div");
      status.className = "status";
      status.textContent = done ? "入浴済み 🛁" : "未入浴";

      card.appendChild(label);
      card.appendChild(status);

      card.onclick = () => {
        state[name] = !state[name];
        saveState(state);
        render();
      };

      app.appendChild(card);
    });
  }

  render();

  setInterval(render, 60000);

  function scheduleReload() {
    const now = new Date();
    const next = new Date();

    next.setHours(RESET_HOUR, 0, 0, 0);
    if (now >= next) {
      next.setDate(next.getDate() + 1);
    }

    setTimeout(() => location.reload(), next - now);
  }

  scheduleReload();
</script>

</body>
</html>
